  <script type="application/ld+json">{"@context": "https://schema.org", "@type": "VideoGame", "name": "Spelling Bee", "url": "https://littleplayers.github.io/spelling-bee/", "image": "https://littleplayers.github.io/og-image.png", "description": "Spelling Bee — listen to the word and type it correctly! An advanced spelling game for kids with levels, lives and a timer.", "applicationCategory": "Game", "operatingSystem": "Web Browser", "genre": "word", "author": {"@type": "Organization", "name": "Little Players"}, "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"}, "audience": {"@type": "PeopleAudience", "suggestedMinAge": 5}, "isPartOf": {"@type": "WebSite", "name": "Little Players", "url": "https://littleplayers.github.io/"}}</script>
<title>🐝 Spelling Bee — Little Players</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐝</text></svg>" />
<style>
  :root{
    --bg:#fffbe8; --card:#fff; --ink:#3d3416; --muted:#9a8c5c;
    --accent:#f5b500; --accent2:#ff9e2c; --good:#22b07d; --bad:#ff5d6c;
    --shadow:0 10px 28px rgba(180,150,40,.18); --radius:18px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; color:var(--ink);
    font-family:"Baloo 2","Comic Sans MS","Trebuchet MS",system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 10%,#fff0b8 0,transparent 42%),
      radial-gradient(circle at 88% 8%,#ffe2b0 0,transparent 44%),
      var(--bg);
    display:flex; flex-direction:column; align-items:center; padding:20px;
  }
  header{text-align:center; margin:14px 0 6px}
  h1{margin:0; font-size:clamp(1.8rem,6vw,2.8rem)}
  .sub{margin:6px 0 0; color:var(--muted); font-weight:700}

  .diff{display:flex; gap:10px; justify-content:center; margin:10px 0 0; flex-wrap:wrap}
  .diff button{border:none;cursor:pointer;font:inherit;font-weight:800;padding:9px 16px;
    border-radius:999px;background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .diff button.on{background:var(--accent);color:#fff}

  .scoreboard{display:flex; gap:10px; margin:16px 0 6px; flex-wrap:wrap; justify-content:center}
  .pill{background:var(--card); border-radius:999px; padding:8px 15px; font-weight:800;
    box-shadow:var(--shadow); font-size:.92rem; display:flex; align-items:center; gap:6px}

  .timerwrap{width:min(520px,94vw); margin:8px 0 2px}
  .timerbar{height:12px; border-radius:999px; background:#f1e6bd; overflow:hidden}
  .timerfill{height:100%; width:100%; border-radius:999px;
    background:linear-gradient(90deg,#22b07d,#7bd88f); transition:width .25s linear}
  .timerfill.warn{background:linear-gradient(90deg,#ffb24a,#ffd27a)}
  .timerfill.danger{background:linear-gradient(90deg,#ff5d6c,#ff8aa0)}

  .game{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:26px 22px; width:min(520px,94vw); margin-top:10px; text-align:center}

  .speaker{font-size:3.4rem; border:none; background:none; cursor:pointer; line-height:1;
    transition:transform .12s} .speaker:active{transform:scale(.9)}
  .listen-label{color:var(--muted); font-weight:800; margin:2px 0 14px}

  .catline{color:var(--muted); font-weight:800; margin:0 0 6px}
  .def{min-height:1.4em; color:var(--accent2); font-weight:700; margin:0 0 16px}

  .typed{display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap}
  input[type=text]{
    font:inherit; font-weight:800; font-size:1.6rem; text-align:center; text-transform:uppercase;
    padding:12px 14px; border-radius:14px; border:3px solid #f0e2a8; width:min(320px,80%);
    letter-spacing:4px; color:var(--ink); background:#fffdf3; outline:none;
  }
  input[type=text]:focus{border-color:var(--accent)}

  .controls{display:flex; gap:9px; justify-content:center; flex-wrap:wrap; margin-top:18px}
  button.act{border:none; cursor:pointer; font:inherit; font-weight:800; padding:11px 18px;
    border-radius:999px; color:#fff; box-shadow:var(--shadow); transition:transform .1s; font-size:.95rem}
  button.act:hover{transform:translateY(-2px)}
  .b-check{background:var(--good)}.b-again{background:#5cc8ff}
  .b-hint{background:var(--accent2)}.b-skip{background:#ff8aa0}

  .feedback{min-height:1.6em; font-weight:800; font-size:1.2rem; margin:14px 0 0}
  .feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
  .hearts{font-size:1.1rem; letter-spacing:2px}

  .overlay{position:fixed; inset:0; background:rgba(70,55,10,.5); display:none;
    align-items:center; justify-content:center; padding:20px; z-index:9}
  .overlay.show{display:flex}
  .panel{background:var(--card); border-radius:22px; padding:30px 26px; text-align:center;
    box-shadow:var(--shadow); width:min(420px,92vw)}
  .panel h2{margin:0 0 6px; font-size:1.8rem}
  .panel p{margin:6px 0; color:var(--muted); font-weight:700}
  .panel .big{font-size:2.4rem; font-weight:800; color:var(--accent2); margin:8px 0}
  .panel button{margin-top:14px; border:none; cursor:pointer; font:inherit; font-weight:800;
    padding:13px 26px; border-radius:999px; background:var(--accent); color:#fff; font-size:1.1rem}

  .note{margin-top:10px; font-size:.82rem; color:var(--muted)}
  .back{margin-top:18px}
  .back a{color:var(--accent2); font-weight:800; text-decoration:none}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .shake{animation:shake .3s ease}
  /* --- mobile/tablet responsiveness guard --- */
  html,body{overflow-x:hidden}
  body>*{max-width:100%}
  @media (max-width:600px){ .sub,.help{font-size:.84rem} }
</style>
</head>
<body>
  <header>
    <h1>🐝 Spelling Bee</h1>
    <p class="sub">Listen to the word, then type it!</p>
  </header>

  <div class="diff" id="diff">
    <button data-d="easy" class="on">😀 Easy</button>
    <button data-d="medium">😎 Medium</button>
    <button data-d="hard">🤓 Hard</button>
  </div>

  <div class="scoreboard">
    <div class="pill">⭐ <span id="score">0</span></div>
    <div class="pill">🏆 Best: <span id="best">0</span></div>
    <div class="pill">📈 Lvl <span id="level">1</span></div>
    <div class="pill">🔥 <span id="streak">0</span></div>
    <div class="pill hearts" id="hearts">❤️❤️❤️</div>
  </div>

  <div class="timerwrap"><div class="timerbar"><div class="timerfill" id="timerfill"></div></div></div>

  <main class="game">
    <p class="catline" id="category">Animals</p>
    <button class="speaker" id="speaker" title="Hear the word">🔊</button>
    <p class="listen-label">Tap to hear the word</p>
    <p class="def" id="def">&nbsp;</p>

    <div class="typed">
      <input type="text" id="answer" autocomplete="off" autocapitalize="characters"
             spellcheck="false" placeholder="type here" />
    </div>

    <div class="controls">
      <button class="act b-check" id="btnCheck">✅ Check</button>
      <button class="act b-again" id="btnAgain">🔁 Hear Again</button>
      <button class="act b-hint" id="btnHint">💡 Hint</button>
      <button class="act b-skip" id="btnSkip">⏭ Skip</button>
    </div>

    <p class="feedback" id="feedback"></p>
    <p class="note" id="note"></p>
  </main>

  <p class="back"><a href="https://littleplayers.github.io/">← Back to Little Players</a></p>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 id="ovTitle">Game Over</h2>
      <p id="ovMsg"></p>
      <div class="big" id="ovScore">0</div>
      <p id="ovBest"></p>
      <button id="ovBtn">▶ Play Again</button>
    </div>
  </div>

<script>
  const WORDS = [
    // EASY (3-4)
    {cat:"Animals",w:"CAT",d:"A small pet that says meow."},
    {cat:"Animals",w:"DOG",d:"A pet that barks and wags its tail."},
    {cat:"Animals",w:"FISH",d:"It swims in water and has fins."},
    {cat:"Animals",w:"FROG",d:"A green animal that hops."},
    {cat:"Fruits",w:"PEAR",d:"A sweet fruit shaped like a teardrop."},
    {cat:"Things",w:"BALL",d:"A round toy you bounce or throw."},
    {cat:"Nature",w:"STAR",d:"It twinkles in the night sky."},
    {cat:"Things",w:"BOOK",d:"You read it; it has pages."},
    {cat:"Colors",w:"BLUE",d:"The color of the sky."},
    {cat:"Things",w:"CAKE",d:"A sweet treat for birthdays."},
    // MEDIUM (5-6)
    {cat:"Animals",w:"TIGER",d:"A big orange cat with stripes."},
    {cat:"Animals",w:"HORSE",d:"A big animal you can ride."},
    {cat:"Fruits",w:"APPLE",d:"A round fruit, red or green."},
    {cat:"Fruits",w:"MANGO",d:"A sweet tropical fruit."},
    {cat:"Nature",w:"RIVER",d:"Water that flows across the land."},
    {cat:"Colors",w:"GREEN",d:"The color of grass."},
    {cat:"Things",w:"PENCIL",d:"You write and draw with it."},
    {cat:"Animals",w:"RABBIT",d:"A fluffy animal with long ears."},
    {cat:"Nature",w:"FLOWER",d:"A pretty plant that smells nice."},
    {cat:"Things",w:"ROCKET",d:"It blasts off into space."},
    // HARD (7+)
    {cat:"Animals",w:"PENGUIN",d:"A black-and-white bird that loves ice."},
    {cat:"Animals",w:"DOLPHIN",d:"A smart sea animal that jumps."},
    {cat:"Animals",w:"ELEPHANT",d:"A big grey animal with a trunk."},
    {cat:"Animals",w:"BUTTERFLY",d:"A colorful insect with big wings."},
    {cat:"Nature",w:"RAINBOW",d:"Colorful arc in the sky after rain."},
    {cat:"Nature",w:"VOLCANO",d:"A mountain that erupts with lava."},
    {cat:"Things",w:"DINOSAUR",d:"A giant reptile from long ago."},
    {cat:"School",w:"COMPUTER",d:"A machine to type and play games on."},
    {cat:"Nature",w:"MOUNTAIN",d:"A very tall, rocky part of the land."},
    {cat:"Things",w:"AIRPLANE",d:"It has wings and flies in the sky."},
  ];

  const DIFF = {
    easy:   {range:[3,4],  time:22, label:"Easy"},
    medium: {range:[5,6],  time:20, label:"Medium"},
    hard:   {range:[7,99], time:18, label:"Hard"},
  };
  const SK="sb_best";
  const $=id=>document.getElementById(id);
  const fill=$("timerfill"), fb=$("feedback"), inp=$("answer");

  let diff="easy", score=0, level=1, streak=0, lives=3, solved=0;
  let best=load(SK,0);
  let current, locked=false;
  let timeLeft, timeMax, timer=null, running=false;

  function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
  function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

  function speak(text){
    try{
      if(!("speechSynthesis" in window)) return false;
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.rate=0.85; u.pitch=1.05; u.lang="en-US";
      window.speechSynthesis.speak(u);
      return true;
    }catch{return false}
  }
  const canSpeak = ("speechSynthesis" in window);
  if(!canSpeak) $("note").textContent="🔇 Your device can't speak the word — use the 💡 Hint to read the clue.";

  function pool(){const[lo,hi]=DIFF[diff].range; return WORDS.filter(x=>x.w.length>=lo&&x.w.length<=hi);}
  function pick(){const p=pool(); return p[Math.floor(Math.random()*p.length)];}

  function startGame(){
    score=0; level=1; streak=0; lives=3; solved=0;
    $("overlay").classList.remove("show");
    paint(); nextWord();
  }

  function nextWord(){
    current=pick(); locked=false;
    $("category").textContent=current.cat;
    $("def").innerHTML="&nbsp;";
    fb.textContent=""; fb.className="feedback";
    inp.value=""; inp.disabled=false; inp.focus();
    timeMax=Math.max(8, DIFF[diff].time - (level-1));
    timeLeft=timeMax; updateBar(); startTimer();
    speak(current.w);
  }

  function startTimer(){
    stopTimer(); running=true;
    timer=setInterval(()=>{ timeLeft-=0.1;
      if(timeLeft<=0){timeLeft=0; updateBar(); timeUp();} else updateBar(); },100);
  }
  function stopTimer(){ if(timer){clearInterval(timer);timer=null} running=false; }
  function updateBar(){
    const pct=Math.max(0,(timeLeft/timeMax)*100);
    fill.style.width=pct+"%";
    fill.className="timerfill"+(pct<25?" danger":pct<50?" warn":"");
  }

  function check(){
    if(locked||!running) return;
    const guess=inp.value.trim().toUpperCase();
    if(!guess) return;
    if(guess===current.w){
      locked=true; stopTimer(); inp.disabled=true;
      const timeBonus=Math.round(timeLeft*2);
      const lenBonus=current.w.length;
      const pts=10+timeBonus+lenBonus+streak*3;
      streak++; solved++; score+=pts;
      if(best<score){best=score; save(SK,best);}
      if(solved%5===0) level++;
      paint();
      fb.textContent=`🎉 Correct! +${pts}`; fb.className="feedback good";
      setTimeout(nextWord,1000);
    } else {
      streak=0; paint();
      fb.textContent="❌ Try again — listen closely!"; fb.className="feedback bad";
      inp.classList.add("shake"); setTimeout(()=>inp.classList.remove("shake"),320);
      inp.select();
    }
  }

  function timeUp(){
    if(locked) return; locked=true; stopTimer(); inp.disabled=true;
    lives--; streak=0; paint();
    fb.textContent=`⏰ Time! It was "${current.w}"`; fb.className="feedback bad";
    if(lives<=0) setTimeout(gameOver,1300); else setTimeout(nextWord,1500);
  }

  function gameOver(){
    stopTimer();
    $("ovTitle").textContent=(score>=best&&score>0)?"🏆 New Best!":"Game Over";
    $("ovMsg").textContent=`You spelled ${solved} word${solved===1?"":"s"} on ${DIFF[diff].label}.`;
    $("ovScore").textContent=score+" pts";
    $("ovBest").textContent="Best score: "+best;
    $("overlay").classList.add("show");
  }

  function hint(){
    if(!running) return;
    $("def").textContent="💡 "+current.d+"  (starts with “"+current.w[0]+"”, "+current.w.length+" letters)";
    timeLeft=Math.max(1,timeLeft-3); updateBar();    // hint costs 3s
  }
  function skip(){ if(!running)return; stopTimer(); lives--; streak=0; paint(); if(lives<=0)gameOver(); else nextWord(); }

  function paint(){
    $("score").textContent=score; $("best").textContent=best;
    $("level").textContent=level; $("streak").textContent=streak;
    $("hearts").textContent="❤️".repeat(Math.max(0,lives))+"🤍".repeat(Math.max(0,3-lives));
  }

  document.querySelectorAll("#diff button").forEach(b=>{
    b.onclick=()=>{ diff=b.dataset.d;
      document.querySelectorAll("#diff button").forEach(x=>x.classList.toggle("on",x===b));
      startGame(); };
  });

  $("speaker").onclick=()=>{ if(current) speak(current.w); };
  $("btnAgain").onclick=()=>{ if(current) speak(current.w); };
  $("btnCheck").onclick=check;
  $("btnHint").onclick=hint;
  $("btnSkip").onclick=skip;
  $("ovBtn").onclick=startGame;
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") check(); });

  startGame();
</script>
</body>
</html>
